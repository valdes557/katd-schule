# Config Nginx pour KATD-SCHÜLE
# À copier sur le VPS :  sudo cp nginx-katdschool.conf /etc/nginx/sites-available/katdschool
# Puis :                 sudo ln -s /etc/nginx/sites-available/katdschool /etc/nginx/sites-enabled/
#                        sudo nginx -t && sudo systemctl reload nginx
# Le HTTPS (bloc 443) est ajouté automatiquement par certbot --nginx.

server {
    listen 80;
    server_name katdschool.com www.katdschool.com;

    # Frontend React (fichiers statiques générés par `npm run build`)
    root /var/www/katd-schule/client/dist;
    index index.html;

    client_max_body_size 20M;   # autorise les uploads de fichiers jusqu'à 20 Mo

    # API → Node (PM2 sur le port 5000)
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fichiers uploadés servis par Node
    location /uploads/ {
        proxy_pass http://localhost:5000;
    }

    # Assets hashés générés par Vite (JS/CSS avec empreinte dans le nom) :
    # cache long immuable — le nom change à chaque build, donc jamais périmé.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router (SPA) : toute route inconnue renvoie index.html.
    # index.html n'est JAMAIS mis en cache : le navigateur récupère toujours les
    # bonnes références de chunks après un déploiement (évite l'écran
    # « Impossible de charger cette page »).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
